# ============================================================================
# Azure Pipelines для Flutter Windows Build
# ============================================================================

trigger:
  - main

pool:
  vmImage: 'windows-latest'

variables:
  flutter_version: '3.19.0'

steps:
  # ✅ 1. Клонирование репозитория
  - checkout: self
    clean: true

  # ✅ 2. Кэш зависимостей Flutter (ускоряет сборку)
  - task: Cache@2
    inputs:
      key: 'flutter | "$(Agent.OS)" | pubspec.yaml | "**/pubspec.lock"'
      restoreKeys: |
        flutter | "$(Agent.OS)"
        flutter
      path: $(Pipeline.Workspace)/.pub-cache
    displayName: 'Cache Flutter dependencies'

  # ✅ 3. Установка Flutter
  - script: |
      choco install flutter --version=$(flutter_version) -y
      flutter --version
      flutter config --enable-windows-desktop
      flutter doctor -v
    displayName: 'Install Flutter $(flutter_version)'

  # ✅ 4. Получение зависимостей из pubspec.yaml
  - script: |
      flutter pub get
    displayName: 'Get Flutter dependencies'

  # ✅ 5. Проверка кода (синтаксис, типы, импорты)
  - script: |
      flutter analyze --fatal-infos
    displayName: '🔍 Analyze code quality'

  # ✅ 6. (Опционально) Тесты. Если тестов нет — шаг пройдёт с предупреждением
  - script: |
      flutter test --coverage || echo "⚠️ Tests not found or failed"
    displayName: 'Run tests (optional)'
    condition: succeeded()

  # ✅ 7. Подготовка Windows-платформы (если ещё не создана)
  - script: |
      if not exist "windows\CMakeLists.txt" (
        echo "⚠️ Windows platform missing, creating..."
        flutter create . --platforms=windows
      ) else (
        echo "✅ Windows platform already exists"
      )
    displayName: 'Ensure Windows platform'

  # ✅ 8. Сборка Windows-приложения
  - script: |
      flutter build windows --release
    displayName: 'Build Windows Release'

  # ✅ 9. Публикация артефакта (готового .exe)
  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: 'build/windows/runner/Release'
      artifactName: 'matrix-app-windows'
    displayName: 'Publish Windows artifact'
